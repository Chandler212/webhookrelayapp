name = "webhookrelayapp"
main = "src/index.ts"
compatibility_date = "2026-03-23"

[observability]
enabled = true

[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[durable_objects]
bindings = [
  { name = "RELAY_SESSIONS", class_name = "RelaySession" },
  { name = "POPULARITY", class_name = "Popularity" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["RelaySession", "Popularity"]

# Per-PoP counters (see README). Tune limit/period in this file.
[[ratelimits]]
name = "RATE_LIMIT_GLOBAL"
namespace_id = "10001"
  [ratelimits.simple]
  limit = 10_000
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_IP"
namespace_id = "10002"
  [ratelimits.simple]
  limit = 300
  period = 60

[[ratelimits]]
name = "RATE_LIMIT_HOOK"
namespace_id = "10003"
  [ratelimits.simple]
  limit = 600
  period = 60
